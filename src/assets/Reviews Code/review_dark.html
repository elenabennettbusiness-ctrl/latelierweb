<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Review Card - Dark Mode</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }

  .review-card {
    position: relative;
    z-index: 1;
    width: 640px;
    height: 460px;
    background: rgba(15, 14, 17, 0.92);
    border-radius: 24px;
    padding: 32px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  .review-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .avatar-photo {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    overflow: hidden;
    background: #0a1424;
    flex-shrink: 0;
  }

  .avatar-photo svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .name-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .reviewer-name {
    font-size: 32px;
    font-weight: 600;
    color: #f1f1f1;
    line-height: 1.2;
  }

  .reviewer-meta {
    font-size: 22px;
    color: #9aa0a6;
    line-height: 1.2;
  }

  .google-logo {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .rating-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 28px;
  }

  .stars {
    display: flex;
    gap: 4px;
  }

  .stars svg {
    width: 32px;
    height: 32px;
  }

  .star-filled {
    fill: #fbbc04;
  }

  .verified-badge {
    width: 28px;
    height: 28px;
    margin-left: 4px;
  }

  .review-text-wrap {
    margin-top: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .review-text {
    font-size: 30px;
    line-height: 1.4;
    color: #e8eaed;
    font-weight: 400;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .review-text.expanded {
    -webkit-line-clamp: unset;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    padding-right: 8px;
  }

  .review-text.expanded::-webkit-scrollbar {
    width: 6px;
  }
  .review-text.expanded::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
  }

  .read-more-btn {
    background: none;
    border: none;
    color: #8ab4f8;
    font-size: 24px;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
    margin-top: 12px;
    align-self: flex-start;
    font-family: Arial, sans-serif;
  }

  .read-more-btn:hover {
    color: #aecbfa;
  }

  .read-more-btn.hidden {
    display: none;
  }
</style>
</head>
<body>

<div class="review-card">

    <div class="review-header">
      <div class="header-left">
        <div class="avatar-photo">
          <svg viewBox="0 0 64 64" preserveAspectRatio="xMidYMid slice">
            <rect width="64" height="64" fill="#0a1424"/>
            <circle cx="10" cy="30" r="0.7" fill="#ffe9b0"/>
            <circle cx="18" cy="26" r="0.6" fill="#ffe9b0"/>
            <circle cx="26" cy="29" r="0.7" fill="#ffdca0"/>
            <circle cx="34" cy="25" r="0.6" fill="#ffe9b0"/>
            <circle cx="42" cy="28" r="0.7" fill="#ffdca0"/>
            <circle cx="50" cy="24" r="0.6" fill="#ffe9b0"/>
            <circle cx="14" cy="34" r="0.5" fill="#ffd27f"/>
            <circle cx="30" cy="33" r="0.5" fill="#ffd27f"/>
            <circle cx="46" cy="32" r="0.5" fill="#ffd27f"/>
            <rect x="30.5" y="4" width="2" height="30" fill="#8a94a8"/>
            <circle cx="31.5" cy="6" r="2.2" fill="#ff8a5c"/>
            <path d="M14 64 C14 46 20 40 30 40 C42 40 48 48 48 64 Z" fill="#05070c"/>
            <circle cx="30" cy="30" r="9" fill="#05070c"/>
          </svg>
        </div>
        <div class="name-meta">
          <div class="reviewer-name">Youssef Ouazzani</div>
          <div class="reviewer-meta">il y a 3 mois</div>
        </div>
      </div>

      <svg class="google-logo" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
        <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
        <path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/>
        <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
      </svg>
    </div>

    <div class="rating-row">
      <div class="stars">
        <svg class="star-filled" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        <svg class="star-filled" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        <svg class="star-filled" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        <svg class="star-filled" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        <svg class="star-filled" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
      </div>
      <svg class="verified-badge" viewBox="0 0 24 24">
        <path fill="#1a73e8" d="M12 2 9.5 4.5 6 4l-.5 3.5L2 9l1.8 3L2 15l3.5 1.5L6 20l3.5-.5L12 22l2.5-2.5L18 20l.5-3.5L22 15l-1.8-3L22 9l-3.5-1.5L18 4l-3.5.5z"/>
        <path fill="#fff" d="M9.8 12.6l-1.9-1.9-1.1 1.1 3 3 5.5-5.5-1.1-1.1z"/>
      </svg>
    </div>

    <div class="review-text-wrap">
      <div class="review-text" id="reviewText">
        Restaurant avec une belle ambiance, belle vue, la nourriture &eacute;tait bonne, l&rsquo;accueil &eacute;tait chaleureux, et le service au top&nbsp;! Je recommande vivement le restaurant
      </div>
      <button class="read-more-btn" id="readMoreBtn">Read more</button>
    </div>

  </div>

<script>
  const textEl = document.getElementById('reviewText');
  const btn = document.getElementById('readMoreBtn');

  function checkClamp() {
    const isClamped = textEl.scrollHeight > textEl.clientHeight + 1;
    if (!isClamped) {
      btn.classList.add('hidden');
    }
  }

  btn.addEventListener('click', () => {
    textEl.classList.add('expanded');
    btn.classList.add('hidden');
  });

  window.addEventListener('load', checkClamp);
</script>

</body>
</html>
